{% extends 'base.html' %}
{% load static %}

{% block title %}LearnSphere - Login{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
<section class="card auth-wrap">
    <h1 class="section-title">Welcome back</h1>
    <p class="section-subtitle">Login to continue your learning journey.</p>

    <form class="auth-form" method="post">
        {% csrf_token %}
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" value="{{ email|default:'' }}" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required>

        <button class="button" type="submit">Login</button>
    </form>

    <p class="auth-meta" style="margin-top:14px;">Don't have an account? <a href="{% url 'register' %}" style="color:#4f46e5; font-weight:700; text-decoration:none;">Create one</a></p>
</section>
{% endblock %}
