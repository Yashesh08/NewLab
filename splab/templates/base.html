<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LearnSphere{% endblock %}</title>
    <style>
        :root {
            --bg: #f5f7ff;
            --card: #ffffff;
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --text: #1f2937;
            --muted: #6b7280;
            --success: #0f766e;
            --warning: #d97706;
            --danger: #b91c1c;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 40%);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            width: min(1100px, 92vw);
            margin: 0 auto;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 20px 0;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary-dark);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 10px;
            border-radius: 8px;
        }

        .nav-links a.active,
        .nav-links a:hover {
            color: var(--primary-dark);
            background: #e0e7ff;
        }

        .page {
            margin-bottom: 40px;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(79, 70, 229, 0.08);
            padding: 24px;
        }

        .section-title {
            margin-bottom: 8px;
            font-size: clamp(1.4rem, 2.4vw, 2rem);
        }

        .section-subtitle {
            color: var(--muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            gap: 16px;
        }

        .grid-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .pill {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
        }

        .pill.success { background: var(--success); }
        .pill.warning { background: var(--warning); }
        .pill.danger { background: var(--danger); }

        .button {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
            background: var(--primary);
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        th {
            background: #f8fafc;
            color: #334155;
        }

        @media (max-width: 900px) {
            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }

            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<div class="container">
    <nav class="navbar">
        <a href="{% url 'home' %}" class="logo">LearnSphere</a>
        <div class="nav-links">
            <a href="{% url 'home' %}" class="{% if active_page == 'home' %}active{% endif %}">Home</a>
            <a href="{% url 'courses' %}" class="{% if active_page == 'courses' %}active{% endif %}">Courses</a>
            <a href="{% url 'instructors' %}" class="{% if active_page == 'instructors' %}active{% endif %}">Instructors</a>
            <a href="{% url 'dashboard' %}" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
        </div>
    </nav>

    <main class="page">
        {% block content %}{% endblock %}
    </main>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
