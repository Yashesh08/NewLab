{% extends 'tutor/base.html' %}
{% block title %}Analytics{% endblock %}
{% block content %}
<div class="row g-3 mb-4">
  <div class="col-md-6"><div class="card p-3"><h5>Assignment Submissions</h5><h2>{{ assignment_submissions }}</h2></div></div>
  <div class="col-md-6"><div class="card p-3"><h5>Course Completion Rate</h5><h2>{{ course_completion_rate }}%</h2></div></div>
</div>
<div class="card p-3"><h5>Monthly Enrollments</h5><canvas id="monthlyChart" height="100"></canvas></div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById('monthlyChart'), {
  type: 'line',
  data: {
    labels: {{ month_labels|safe }},
    datasets: [{label: 'Enrollments', data: {{ monthly_enrollments|safe }}, borderColor: '#0d6efd', tension: 0.3}]
  }
});
</script>
{% endblock %}
