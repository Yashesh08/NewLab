{% extends 'base.html' %}
{% block title %}Tutor Analytics{% endblock %}
{% block content %}
<section class="grid grid-2">
  <article class="card"><h3>Student Completion Rate</h3><p class="kpi">{{ completion_rate }}%</p></article>
  <article class="card"><h3>Assignment Submission Rate</h3><p class="kpi">{{ submission_rate }}%</p></article>
</section>
<section class="card" style="margin-top:16px;">
  <h3>Analytics Charts</h3>
  <canvas id="enrollmentChart" height="80"></canvas>
  <canvas id="monthlyChart" height="80"></canvas>
</section>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById('enrollmentChart'), {type:'bar', data:{labels: {{ course_labels|safe }}, datasets:[{label:'Enrollments', data: {{ enrollments_per_course|safe }}, backgroundColor:'#4f46e5'}]}});
new Chart(document.getElementById('monthlyChart'), {type:'line', data:{labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'], datasets:[{label:'Monthly New Students', data: {{ monthly_new_students|safe }}, borderColor:'#0f766e'}]}});
</script>
{% endblock %}
